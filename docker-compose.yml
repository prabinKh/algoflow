version: '3.8'

services:
  # Django Backend
  backend:
    build:
      context: ./algoflow_django
      dockerfile: Dockerfile
    container_name: algoflow_backend
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./algoflow_django/logs:/app/logs
      - ./algoflow_django/algoflow.db:/app/algoflow.db
    env_file:
      - ./algoflow_django/.env
    environment:
      - DEBUG=False
      - SECRET_KEY=${DJANGO_SECRET_KEY:-your-secret-key-change-in-production}
      - DATABASE_URL=sqlite:///app/algoflow.db
      - CORS_ALLOWED_ORIGINS=http://localhost,http://localhost:80
      - CSRF_TRUSTED_ORIGINS=http://localhost,http://localhost:80
      - STATIC_ROOT=/app/staticfiles
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    networks:
      - algoflow_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/algorithms/')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # React Frontend
  frontend:
    build:
      context: ./algoflow_frontend
      dockerfile: Dockerfile
    container_name: algoflow_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - algoflow_network
    restart: unless-stopped

networks:
  algoflow_network:
    driver: bridge

volumes:
  static_volume:
  media_volume:
